[pydocstyle]
match = (?!test_|__|.*autogenerated.*).*\.py
ignore = D104,D202,D203,D212

[tool:pytest]
addopts =
  -x
  --disable-pytest-warnings --disable-warnings
  --cov=okrs_api --cov-report term-missing --cov-report term
  -n 0
junit_family=xunit2
markers =
    integration: mark a test as an integration test.

[flake8]
ignore = E231,F405,W503,C901,E203
per-file-ignores =
    okrs_api/settings.py:W503
exclude =
  *.egg-info,
  *.pyc,
  .cache,
  .eggs
  .git,
  .tox,
  __pycache__,
  build,
  dist,
  docs/source/conf.py,
  tests/fixtures/*
  okrs_api/api/models_autogenerated.py
import-order-style = google
max-complexity = 10
max-line-length = 120

[coverage:run]
omit =
  *__init__.py
  okrs_api/api/models_autogenerated.py
  okrs_api/connexion_utils.py
  okrs_api/database.py
  okrs_api/main.py
  okrs_api/settings.py
disable_warnings = no-data-collected
