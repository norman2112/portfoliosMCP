table:
  name: activity_logs
  schema: public
object_relationships:
  - name: work_item
    using:
      manual_configuration:
        column_mapping:
          work_item_id: id
        insertion_order: null
        remote_table:
          name: work_items
          schema: public
insert_permissions:
  - role: edit
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - action
        - id
        - info
        - key_result_id
        - objective_id
        - progress_point_id
        - work_item_id
