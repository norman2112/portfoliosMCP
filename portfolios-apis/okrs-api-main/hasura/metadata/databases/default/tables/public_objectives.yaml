                  - _not:
                      okr_role:
                        _eq: none
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
      allow_aggregations: true
  - role: okrs-integration
    permission:
      columns:
        - app_owned_by
        - created_at
        - description
        - ends_at
        - id
        - level_depth
        - name
        - owned_by
        - parent_objective_id
        - progress_percentage
        - rolled_up_progress_percentage
        - starts_at
        - work_item_container_id
      filter:
        _and:
          - tenant_group_id_str:
              _eq: X-Hasura-Org-Id
          - deleted_at_epoch:
              _eq: "0"
    comment: okrs-integration role has access to all the objectives within a tenant group.
  - role: read
    permission:
      columns:
