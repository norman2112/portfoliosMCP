table:
  name: objectives
  schema: public
object_relationships:
  - name: parent_objective
    using:
      foreign_key_constraint_on: parent_objective_id
  - name: work_item_container
    using:
      foreign_key_constraint_on: work_item_container_id
array_relationships:
  - name: child_objectives
    using:
      foreign_key_constraint_on:
        column: parent_objective_id
        table:
          name: objectives
          schema: public
  - name: key_results
    using:
      foreign_key_constraint_on:
        column: objective_id
        table:
          name: key_results
          schema: public
  - name: progress_points
    using:
      manual_configuration:
        column_mapping:
          id: objective_id
        insertion_order: null
        remote_table:
          name: objective_progress_points_view
          schema: public
select_permissions:
  - role: edit
    permission:
      columns:
        - achieved_at
        - app_owned_by
        - created_at
        - description
        - ends_at
        - id
        - level_depth
        - name
        - owned_by
        - parent_objective_id
        - progress_percentage
        - rolled_up_progress_percentage
        - starts_at
        - updated_at
        - work_item_container_id
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - work_item_container:
              work_item_container_roles:
                _and:
                  - _or:
                      - created_by:
                          _eq: X-Hasura-User-Id
                      - _and:
                          - app_created_by:
                              _eq: X-Hasura-Platforma-App-User-Id
                          - _not:
                              app_created_by:
                                _eq: ""
                  - _not:
                      okr_role:
                        _eq: none
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
      allow_aggregations: true
  - role: manage
    permission:
      columns:
        - achieved_at
        - app_owned_by
        - created_at
        - description
        - ends_at
        - id
        - level_depth
        - name
        - owned_by
        - parent_objective_id
        - progress_percentage
        - rolled_up_progress_percentage
        - starts_at
        - updated_at
        - work_item_container_id
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - work_item_container:
              work_item_container_roles:
                _and:
                  - _or:
                      - created_by:
                          _eq: X-Hasura-User-Id
                      - _and:
                          - app_created_by:
                              _eq: X-Hasura-Platforma-App-User-Id
                          - _not:
