event_triggers:
  - name: insert_objectives_datascience
    definition:
      enable_manual: false
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 60
    webhook_from_env: DATAPIPELINE_ENDPOINT
  - name: objectives
    definition:
      delete:
        columns: '*'
      enable_manual: true
      insert:
        columns: '*'
      update:
        columns:
          - ends_at
          - progress_percentage
          - description
          - deleted_at_epoch
          - level_depth
          - app_owned_by
          - name
          - starts_at
          - rolled_up_progress_percentage
          - parent_objective_id
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 120
    webhook_from_env: HASURA_EVENTS_WEBHOOK_URL
