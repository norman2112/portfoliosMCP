table:
  name: work_item_containers
  schema: public
array_relationships:
  - name: objectives
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: objectives
          schema: public
  - name: space_work_item_container_mappings
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: space_work_item_container_mappings
          schema: public
  - name: work_item_container_roles
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: work_item_container_roles
          schema: public
  - name: work_items
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: work_items
          schema: public
insert_permissions:
  - role: edit
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        app_name: x-hasura-App-Name
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - container_type
        - external_id
        - external_title
        - external_type
  - role: manage
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        app_name: x-hasura-App-Name
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - container_type
        - external_id
        - external_title
        - external_type
  - role: user
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        app_name: x-hasura-App-Name
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - container_type
        - external_id
        - external_title
        - external_type
select_permissions:
  - role: edit
    permission:
      columns:
        - app_name
        - container_type
        - external_id
        - external_title
        - external_type
        - id
        - level_depth_default
        - objective_editing_levels
        - updated_at
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
      allow_aggregations: true
  - role: manage
    permission:
      columns:
        - app_name
