event_triggers:
  - name: work_item_containers
    definition:
      enable_manual: true
      insert:
        columns: '*'
      update:
        columns:
          - level_depth_default
          - objective_editing_levels
          - external_id
          - external_title
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 60
    webhook_from_env: HASURA_EVENTS_WEBHOOK_URL
