              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
      allow_aggregations: true
  - role: user
    permission:
      columns:
        - app_name
        - container_type
        - external_id
        - external_title
        - external_type
        - id
        - level_depth_default
