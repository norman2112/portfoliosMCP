table:
  name: work_items
  schema: public
object_relationships:
  - name: work_item_container
    using:
      foreign_key_constraint_on: work_item_container_id
array_relationships:
  - name: key_result_work_item_mappings
    using:
      foreign_key_constraint_on:
        column: work_item_id
        table:
          name: key_result_work_item_mappings
          schema: public
insert_permissions:
  - role: edit
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        app_name: x-hasura-App-Name
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - container_type
        - external_id
        - external_type
        - item_type
        - planned_finish
        - planned_start
        - state
        - title
        - work_item_container_id
  - role: manage
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        app_name: x-hasura-App-Name
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - container_type
        - external_id
        - external_type
        - item_type
        - planned_finish
        - planned_start
        - state
        - title
        - work_item_container_id
  - role: user
    permission:
      check: {}
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        app_name: x-hasura-App-Name
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - container_type
        - external_id
        - external_type
        - item_type
        - planned_finish
        - planned_start
        - state
        - title
        - work_item_container_id
select_permissions:
  - role: edit
    permission:
      columns:
        - app_name
        - container_type
        - created_at
        - external_id
        - external_type
        - id
        - item_type
        - planned_finish
        - planned_start
        - state
        - title
        - updated_at
        - work_item_container_id
      filter:
        _or:
          - tenant_group_id_str:
              _eq: X-Hasura-Org-Id
          - _and:
              - tenant_id_str:
                  _eq: X-Hasura-Platforma-App-Tenant-Id
              - _not:
                  tenant_id_str:
                    _eq: ""
      allow_aggregations: true
  - role: manage
    permission:
      columns:
        - app_name
