          - _and:
              - tenant_id_str:
                  _eq: X-Hasura-Platforma-App-Tenant-Id
              - _not:
                  tenant_id_str:
                    _eq: ""
      allow_aggregations: true
  - role: user
    permission:
      columns:
        - app_name
        - container_type
        - created_at
        - external_id
        - external_type
        - id
        - item_type
        - planned_finish
        - planned_start
        - state
        - title
        - updated_at
        - work_item_container_id
      filter:
        _or:
          - tenant_group_id_str:
              _eq: X-Hasura-Org-Id
          - _and:
              - tenant_id_str:
                  _eq: X-Hasura-Platforma-App-Tenant-Id
