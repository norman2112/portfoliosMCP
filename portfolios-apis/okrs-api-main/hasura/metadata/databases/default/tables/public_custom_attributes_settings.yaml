table:
  name: custom_attributes_settings
  schema: public
select_permissions:
  - role: edit
    permission:
      columns:
        - enabled
        - id
        - label
        - label_hidden
        - tooltip
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
  - role: manage
    permission:
      columns:
        - enabled
        - id
        - label
        - label_hidden
        - tooltip
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
  - role: read
    permission:
      columns:
        - enabled
        - id
        - label
        - label_hidden
        - tooltip
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
  - role: user
    permission:
      columns:
        - enabled
        - id
        - label
        - label_hidden
        - tooltip
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - _or:
              - tenant_group_id_str:
                  _eq: X-Hasura-Org-Id
              - _and:
                  - tenant_id_str:
                      _eq: X-Hasura-Platforma-App-Tenant-Id
                  - _not:
                      tenant_id_str:
                        _eq: ""
