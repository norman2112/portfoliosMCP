table:
  name: key_result_work_item_mappings
  schema: public
object_relationships:
  - name: key_result
    using:
      foreign_key_constraint_on: key_result_id
  - name: work_item
    using:
      foreign_key_constraint_on: work_item_id
insert_permissions:
  - role: edit
    permission:
      check:
        key_result:
          objective:
            work_item_container:
              work_item_container_roles:
                _and:
                  - _or:
                      - created_by:
                          _eq: X-Hasura-User-Id
                      - _and:
                          - app_created_by:
                              _eq: X-Hasura-Platforma-App-User-Id
                          - _not:
                              app_created_by:
                                _eq: ""
                  - _not:
                      okr_role:
                        _eq: none
      set:
        app_created_by: x-hasura-Platforma-App-User-Id
        created_by: x-hasura-User-Id
        tenant_group_id_str: x-hasura-Org-Id
        tenant_id_str: x-hasura-Platforma-App-Tenant-Id
      columns:
        - key_result_id
        - work_item_id
