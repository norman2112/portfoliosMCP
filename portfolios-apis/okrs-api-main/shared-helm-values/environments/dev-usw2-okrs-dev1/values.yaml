# Default values for roadmaps.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  region: "us-west-2"
  domain: "platforma-dev.io"
  registry: "486329218230.dkr.ecr.us-west-2.amazonaws.com"
  env: dev


### Okrs api service
foundation-api-chart:
  fullnameOverride: "okrs-api"

  image:
    repository: "dev1-okrs-api" #move to base chart
    tag: "dev1" #move to base chart

  configmap:
    SENTRY_DSN: https://e821c0f7a5df45b6aae68d9e23202795@o497265.ingest.sentry.io/5965148
    CONNEXION_ENVIRONMENT: development
    ADMIN_IH_DOMAIN: us-west-2.pvintegrations-staging.net
    IH_DOMAIN: us-west-2.pvintegrations-staging.net
    LK_ENV: d09
    HASURA_GRAPHQL_ENDPOINT: http://hasura.okrs-dev1.svc.cluster.local
    PGPOOL2_HOST: "pgpool2.okrs-dev1.svc.cluster.local"
    PGPOOL2_PORT: "9999"
    HASURA_DATASERVICE_ENDPOINT: http://odata-hasura.okrs-dev1.svc.cluster.local
    JOB_QUEUE: okrs-batch-job-queue
    JOB_DEFINITION: okrs-batch-job-definition
    
  env:
    DATABASE_URL: postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/$(PGDATABASE)    

  aws:
    secrets:
      - secretKey: LK_JWT_SECRET
        remoteRef:
          key: development/okr/api
          property: LK_JWT_SECRET
      - secretKey: IH_CLIENT_ID
        remoteRef:
          key: development/okr/api
          property: IH_CLIENT_ID
      - secretKey: IH_CLIENT_SECRET
        remoteRef:
          key: development/okr/api
          property: IH_CLIENT_SECRET
      - secretKey: IH_ADMIN_CLIENT_ID
        remoteRef:
          key: development/okr/api
          property: IH_ADMIN_CLIENT_ID
      - secretKey: IH_ADMIN_CLIENT_SECRET
        remoteRef:
          key: development/okr/api
          property: IH_ADMIN_CLIENT_SECRET
      - secretKey: PUBNUB_PUBLISH_KEY
        remoteRef:
          key: development/okr/api
          property: PUBNUB_PUBLISH_KEY
      - secretKey: PUBNUB_SUBSCRIBER_KEY
        remoteRef:
          key: development/okr/api
          property: PUBNUB_SUBSCRIBER_KEY
      - secretKey: PUBNUB_SECRET_KEY
        remoteRef:
          key: development/okr/api
          property: PUBNUB_SECRET_KEY
      - secretKey: PUBNUB_UUID
        remoteRef:
          key: development/okr/api
          property: PUBNUB_UUID
      - secretKey: HASURA_DATASERVICE_ADMIN_SECRET
        remoteRef:
          key: development/okr/hasura
          property: HASURA_GRAPHQL_ADMIN_SECRET
      - secretKey: PLANVIEW_TOKEN_SERVICE_CLIENT_ID
        remoteRef:
          key: development/okr/api
          property: PLANVIEW_TOKEN_SERVICE_CLIENT_ID
      - secretKey: PLANVIEW_TOKEN_SERVICE_CLIENT_SECRET
        remoteRef:
          key: development/okr/api
          property: PLANVIEW_TOKEN_SERVICE_CLIENT_SECRET
      - secretKey: PLANVIEW_TOKEN_SERVICE_REGION
        remoteRef:
          key: development/okr/api
          property: PLANVIEW_TOKEN_SERVICE_REGION

  securityContext:
    allowPrivilegeEscalation: false

