pgpool2-chart:
  fullnameOverride: "pgpool2"
    
  aws:
    secrets:
      - secretKey: PGPOOL_PARAMS_BACKEND_HOSTNAME0
        remoteRef:
          key: aurora/okrsdev1
          property: PGHOST
      - secretKey: PGPOOL_PARAMS_BACKEND_HOSTNAME1
        remoteRef:
          key: aurora/okrsdev1
          property: PGREADER

  resources:
    requests:
      memory: "350Mi"
      cpu: "50m"
    limits:
      memory: "450Mi"
      cpu: "100m"        

  securityContext:
    allowPrivilegeEscalation: false

