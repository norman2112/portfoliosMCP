odata-chart:
  fullnameOverride: "okrs-odata"
  image:
    repository: "dev-okrs-odata" 
    tag: "dev"
  env:
    HASURA_OKR_URL: https://okr-odata-hasura-us-west-2.platforma-dev.io/v1/graphql
    COGNITO_URL: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_EgR4jyqiX
    OKR_ODATA_PAGESIZE: 10000 

  ingress:
    enabled: true
    hosts:
      - host: okr-odata-us-west-2.platforma-dev.io
        secretName: okr-odata.platforma-dev-tls
    altURL: "okr-odata-us-west-2.planview-dev.io"

  securityContext:
    allowPrivilegeEscalation: false

####
hasura-chart:
  image:
  # Overrides the image tag whose default is the chart appVersion.
    tag: "v2.37.0"

  env:
    # Reader instance by default.
    HASURA_GRAPHQL_DATABASE_URL: postgresql://$(PGUSER):$(PGPASSWORD)@$(PGPOOL2_HOST):$(PGPOOL2_PORT)/$(PGDATABASE)
    HASURA_GRAPHQL_EE_LICENSE_KEY: "$(HASURA_GRAPHQL_EE_KEY)"

  configmap:
    HASURA_BASE_API_URL: "http://okrs-api.okrs-dev1.svc.cluster.local/api"
    HASURA_EVENTS_WEBHOOK_URL: "http://okrs-api.okrs-dev1.svc.cluster.local/api/events"
    HASURA_GRAPHQL_DEV_MODE: "false"
    HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
    PGPOOL2_HOST: "pgpool2.okrs-dev1.svc.cluster.local"
    PGPOOL2_PORT: "9999"
    HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_REFETCH_INTERVAL: "2000"     

  aws:
    secrets:
      - secretKey: HASURA_GRAPHQL_JWT_SECRET
        remoteRef:
          key: development/cdk/platforma/platforma-auth
          property: hasuraJwtSecret
      - secretKey: HASURA_GRAPHQL_ADMIN_SECRET
        remoteRef:
          key: development/okr/hasura
          property: HASURA_GRAPHQL_ADMIN_SECRET
      - secretKey: HASURA_GRAPHQL_EE_KEY
        remoteRef:
          key: common/hasura
          property: EE_LICENSE_KEY          

  nlb:
    enabled: true

  securityContext:
    allowPrivilegeEscalation: false

####
odata-hasura-chart:
  fullnameOverride: "odata-hasura"
  image:
  # Overrides the image tag whose default is the chart appVersion.
    tag: "v2.20.0"

  env:
    HASURA_GRAPHQL_DATABASE_URL: postgresql://$(PGUSER):$(PGPASSWORD)@$(PGREADER):$(PGPORT)/$(PGDATABASE)
    HASURA_GRAPHQL_METADATA_DATABASE_URL: "postgresql://$(PGUSER):$(PGPASSWORD)@$(PGHOST):$(PGPORT)/metadata"
    HASURA_GRAPHQL_EE_LICENSE_KEY: "$(HASURA_GRAPHQL_EE_KEY)"

  configmap:
    HASURA_BASE_API_URL: "http://okrs-api.okrs-dev1.svc.cluster.local/api"
    HASURA_EVENTS_WEBHOOK_URL: "http://okrs-api.okrs-dev1.svc.cluster.local/api/events"
    HASURA_GRAPHQL_DEV_MODE: "false"
    HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
    PGPOOL2_HOST: "pgpool2.okrs-dev1.svc.cluster.local"
    PGPOOL2_PORT: "9999"
    HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_REFETCH_INTERVAL: "2000"

  aws:
    secrets:
      - secretKey: HASURA_GRAPHQL_JWT_SECRET
        remoteRef:
          key: development/cdk/platforma/platforma-auth
          property: hasuraJwtSecret
      - secretKey: HASURA_GRAPHQL_ADMIN_SECRET
        remoteRef:
          key: development/okr/hasura
          property: HASURA_GRAPHQL_ADMIN_SECRET
      - secretKey: HASURA_GRAPHQL_EE_KEY
        remoteRef:
          key: common/hasura
          property: EE_LICENSE_KEY

  nlb:
    enabled: true

  service:
    type: LoadBalancer

  securityContext:
    allowPrivilegeEscalation: false

