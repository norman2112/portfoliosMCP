dovetail-standalone-chart:
  fullnameOverride: "dovetail-standalone"

  replicaCount: 3

  image:
    repository: "dev-dovetail-standalone"
    tag: "dev"

  configmap:
    NODE_ENV: "development"
    PROJECT: "OKRs"
    BACKEND_API_URL: okrs-perf-hasura-us-west-2.platforma-dev.io/v1/graphql
    DOVETAIL_ENVIRONMENT: "dev"
    DOVETAIL_PACKAGE: https://dovetail.platforma-dev.io/dist/OKR.min.js
    DOVETAIL_PRODUCT_NAME: leankit
    PLATFORMA_APP_NAME: OKR
    LOG_LEVEL: "http"
    PLANVIEW_ADMIN_URL: https://us.id.planviewlogindev.net
    PLANVIEW_ADMIN_APP_NAME: okrs
    COGNITO_URL: https://cognito-idp.us-west-2.amazonaws.com/us-west-2_EgR4jyqiX
    CALLBACK_URL: https://okrs.platforma-dev.io/callback
    PENDO_API_KEY: c880b643-ca56-4203-6b72-3c2c1792a5c3

  aws:
    secrets:
      - secretKey: PLANVIEW_TOKEN_SERVICE_CLIENT_ID
        remoteRef:
          key: development/okr/api
          property: PLANVIEW_TOKEN_SERVICE_CLIENT_ID
      - secretKey: PLANVIEW_TOKEN_SERVICE_CLIENT_SECRET
        remoteRef:
          key: development/okr/api
          property: PLANVIEW_TOKEN_SERVICE_CLIENT_SECRET
      - secretKey: COOKIE_SECRET
        remoteRef:
          key: development/okr/api
          property: COOKIE_SECRET
  ingress:
    enabled: true
    hosts:
      - host: okrs-perf.platforma-dev.io
        secretName: okrs-perf.platforma-dev-tls

  resources:
    requests:
      memory: "100Mi"
      cpu: "100m"
    limits:
      memory: "150Mi"
      cpu: "150m"

  securityContext:
    allowPrivilegeEscalation: false

  nodeSelector:
    dedicated: okrs
  tolerations:
    - key: "okrs"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
