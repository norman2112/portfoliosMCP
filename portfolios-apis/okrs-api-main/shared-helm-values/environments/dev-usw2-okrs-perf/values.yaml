####
hasura-chart:
  image:
  # Overrides the image tag whose default is the chart appVersion.
    tag: "v2.44.0"

  env:
    # Reader instance by default.
    HASURA_GRAPHQL_DATABASE_URL: postgresql://$(PGUSER):$(PGPASSWORD)@$(PGPOOL2_HOST):$(PGPOOL2_PORT)/$(PGDATABASE)
    HASURA_GRAPHQL_EE_LICENSE_KEY: "$(HASURA_GRAPHQL_EE_KEY)"

  configmap:
    HASURA_BASE_API_URL: "http://okrs-api.okrs-perf.svc.cluster.local/api"
    HASURA_EVENTS_WEBHOOK_URL: "http://okrs-api.okrs-perf.svc.cluster.local/api/events"
    # HASURA_EVENTS_WEBHOOK_URL: "http://okrs-api-async.okrs.svc.cluster.local/api/events"
    DATAPIPELINE_ENDPOINT: "https://ergeob5jjd.execute-api.us-west-2.amazonaws.com/dev/consume" #private-apigw
    HASURA_GRAPHQL_DEV_MODE: "false"
    HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
    PGPOOL2_HOST: "pgpool2.okrs-perf.svc.cluster.local"
    PGPOOL2_PORT: "9999"
    HASURA_GRAPHQL_LIVE_QUERIES_MULTIPLEXED_REFETCH_INTERVAL: "2000"

  aws:
    secrets:
      - secretKey: HASURA_GRAPHQL_JWT_SECRET
        remoteRef:
          key: development/cdk/platforma/platforma-auth
          property: hasuraJwtSecret
      - secretKey: HASURA_GRAPHQL_ADMIN_SECRET
        remoteRef:
          key: development/okr/hasura
          property: HASURA_GRAPHQL_ADMIN_SECRET
      - secretKey: HASURA_GRAPHQL_EE_KEY
        remoteRef:
          key: common/hasura
          property: EE_LICENSE_KEY

  resources:
    requests:
      memory: "425Mi" #based on observed Sumo metrics
      cpu: "100m"
    limits:
      memory: "1000Mi" #based on observed Sumo metrics
      cpu: "500m"

  nlb:
    enabled: true

  securityContext:
    allowPrivilegeEscalation: false

  nodeSelector:
    dedicated: okrs
  tolerations:
    - key: "okrs"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

