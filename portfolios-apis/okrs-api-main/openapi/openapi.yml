    post:
      summary: >
        Hello World Example.
      operationId: okrs_api.api.controller.actions.hello_world
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        200:
          description: Success
          content: {}
        400:
          description: Bad request
          content: {}
        404:
          description: Not found
          content: {}
        422:
          description: Bad or malformed request for search
          content: {}
  /actions/connect-activities:
    post:
      summary: >
        Connects a set of Work Items to a Key Result and it corresponding Work Item Container.
      operationId: okrs_api.api.controller.actions.connect_activities
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - input
              properties:
                input:
                  type: object
                  required:
                    - key_result_id
                    - work_item_container
                    - work_items
                  properties:
                    key_result_id:
                      type: integer
                    work_item_container:
                      type: object
                      required:
                        - external_id
                        - external_type
                      properties:
                        external_id:
                          type: string
                        external_type:
                          type: string
                    work_items:
                      type: array
                      items:
                        $ref: "#/components/schemas/WorkItem"
      responses:
        200:
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyResultWorkItemMappings"
        400:
          description: Bad request
          content: {}
        404:
          description: Not found
          content: {}
        422:
          description: Bad or malformed request for search
          content: {}
  /actions/create-activity:
    post:
      summary: >
        Create Activity based on input values.
      operationId: okrs_api.api.controller.actions.create_activity
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - input
              properties:
                input:
                  type: object
                  required:
                    - key_result_id
                    - context_id
                    - context_title
                    - title
                    - external_activity_type_id
                    - product_type
                  properties:
                    key_result_id:
                      type: integer
                      format: int64
                    domain:
                      $ref: "#/components/schemas/Domain"
                    context_id:
                      type: string
                    context_title:
                      type: string
                    product_type:
                      $ref: "#/components/schemas/PlanviewProductType"
                    title:
                      type: string
                    planned_start:
                      type: string
                    planned_finish:
                      type: string
                    external_activity_type_id:
                      type: string
      responses:
        200:
          description: Success
          content: {}
        400:
          description: Bad request
          content: {}
        404:
          description: Not found
          content: {}
        422:
          description: Bad or malformed request for search
          content: {}
