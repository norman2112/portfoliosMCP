components:
  schemas:
    ActionType:
      type: string
      enum:
        - add_or_edit
        - delete
    OkrRole:
      type: string
      enum:
        - none
        - read
        - edit
        - manage
    ValueType:
      type: string
      enum:
        - dollars
        - percent
        - units
        - count
      default: count
    PlanviewProductType:
      type: string
      enum:
        - leankit
        - e1
        - e1_prm
        - e1_work
        # will add 'e1' and 'ppl' later
    ContainerType:
      type: string
      enum:
