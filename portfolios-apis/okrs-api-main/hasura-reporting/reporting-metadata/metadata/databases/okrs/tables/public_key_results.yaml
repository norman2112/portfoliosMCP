table:
  name: key_results
  schema: public
object_relationships:
  - name: objective
    using:
      foreign_key_constraint_on: objective_id
array_relationships:
  - name: key_result_work_item_mappings
    using:
      foreign_key_constraint_on:
        column: key_result_id
        table:
          name: key_result_work_item_mappings
          schema: public
  - name: progress_points
    using:
      foreign_key_constraint_on:
        column: key_result_id
        table:
          name: progress_points
          schema: public
  - name: targets
    using:
      foreign_key_constraint_on:
        column: key_result_id
        table:
          name: targets
          schema: public
select_permissions:
  - role: reporting
    permission:
      columns:
        - achieved_at
        - app_created_by
        - app_last_updated_by
        - app_owned_by
        - created_at
        - created_by
        - data_source
        - deleted_at_epoch
        - description
        - ends_at
        - id
        - last_updated_by
        - name
        - objective_id
        - owned_by
        - progress_percentage
        - starting_value
        - starts_at
        - target_value
        - tenant_group_id_str
        - tenant_id_str
        - updated_at
        - value_type
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - tenant_group_id_str:
              _eq: X-Hasura-Org-Id
      allow_aggregations: true
