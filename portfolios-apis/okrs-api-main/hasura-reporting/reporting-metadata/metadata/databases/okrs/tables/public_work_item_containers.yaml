table:
  name: work_item_containers
  schema: public
array_relationships:
  - name: objectives
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: objectives
          schema: public
  - name: space_work_item_container_mappings
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: space_work_item_container_mappings
          schema: public
  - name: work_item_container_roles
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: work_item_container_roles
          schema: public
  - name: work_items
    using:
      foreign_key_constraint_on:
        column: work_item_container_id
        table:
          name: work_items
          schema: public
select_permissions:
  - role: reporting
    permission:
      columns:
        - deleted_at_epoch
        - id
        - app_created_by
        - app_last_updated_by
        - app_name
        - created_by
        - external_id
        - external_title
        - external_type
        - last_updated_by
        - tenant_group_id_str
        - tenant_id_str
        - level_depth_default
        - objective_editing_levels
        - created_at
        - updated_at
      filter:
        _and:
          - deleted_at_epoch:
              _eq: 0
          - tenant_group_id_str:
              _eq: X-Hasura-Org-Id
      allow_aggregations: true
