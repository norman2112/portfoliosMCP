table:
  name: work_item_container_roles
  schema: public
object_relationships:
  - name: work_item_container
    using:
      foreign_key_constraint_on: work_item_container_id
select_permissions:
  - role: reporting
    permission:
      columns:
        - id
        - work_item_container_id
        - app_created_by
        - app_last_updated_by
        - app_role
        - created_by
        - last_updated_by
        - okr_role
        - tenant_group_id_str
        - tenant_id_str
        - created_at
        - updated_at
      filter:
        tenant_group_id_str:
          _eq: X-Hasura-Org-Id
      allow_aggregations: true
